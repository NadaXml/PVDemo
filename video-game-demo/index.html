<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动影游 - 分支剧情体验</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            margin-bottom: 15px;
            font-size: 2em;
            text-shadow: 0 0 30px rgba(233, 69, 96, 0.6);
            background: linear-gradient(90deg, #e94560, #ffd700, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 960px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
            background: #000;
        }

        #videoContainer {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 视频结束后的选择界面 */
        .choice-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%);
            display: none;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }

        .choice-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .choice-timer {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: conic-gradient(#e94560 var(--progress), transparent var(--progress));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .choice-timer::before {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #1a1a2e;
        }

        .choice-timer span {
            position: relative;
            z-index: 1;
        }

        .choice-question {
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            animation: slideUp 0.5s ease 0.2s both;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .choice-btn {
            padding: 18px 30px;
            border: 2px solid rgba(233, 69, 96, 0.5);
            background: rgba(233, 69, 96, 0.1);
            color: #fff;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            text-align: left;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            animation: slideUp 0.5s ease calc(0.1s * var(--index)) both;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .choice-btn:hover {
            background: rgba(233, 69, 96, 0.3);
            border-color: #e94560;
            transform: translateX(10px);
            box-shadow: 0 5px 30px rgba(233, 69, 96, 0.4);
        }

        .choice-btn .key {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #e94560;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
        }

        /* 结局画面 */
        .ending-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(10,10,10,0.95) 0%, rgba(26,26,46,0.95) 100%);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .ending-overlay.active {
            display: flex;
            animation: fadeIn 1s ease;
        }

        .ending-title {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ending-desc {
            font-size: 20px;
            color: #aaa;
            max-width: 600px;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .ending-stats {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            color: #e94560;
            font-weight: bold;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        /* 控制栏 */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #533483, #7b2cbf);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(83, 52, 131, 0.4);
        }

        /* 进度条 */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ffd700);
            width: 0%;
            transition: width 0.1s linear;
        }

        /* 节点地图 */
        .node-map {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            max-width: 960px;
            width: 100%;
        }

        .node-map h3 {
            margin-bottom: 15px;
            color: #aaa;
            font-size: 16px;
        }

        .node-path {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .node-item {
            padding: 8px 16px;
            background: rgba(233, 69, 96, 0.2);
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        .node-item.current {
            background: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .node-arrow {
            color: #666;
            font-size: 20px;
        }

        /* 隐藏元素 */
        #hiddenVideo {
            display: none;
        }

        .video-upload {
            margin-top: 15px;
        }

        .video-upload input {
            display: none;
        }

        .video-upload label {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .video-upload label:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(17, 153, 142, 0.4);
        }
    </style>
</head>
<body>
    <h1>🎬 互动影游 - 分支剧情体验</h1>
    
    <div class="game-container">
        <div id="videoContainer">
            <video id="mainVideo" crossorigin="anonymous"></video>
            
            <!-- 选择界面 -->
            <div class="choice-overlay" id="choiceOverlay">
                <div class="choice-timer" id="choiceTimer" style="--progress: 0%">
                    <span id="timerText">10</span>
                </div>
                <div class="choice-question" id="choiceQuestion">你会怎么选择？</div>
                <div class="choices-container" id="choicesContainer"></div>
            </div>
            
            <!-- 结局画面 -->
            <div class="ending-overlay" id="endingOverlay">
                <div class="ending-title" id="endingTitle">结局达成</div>
                <div class="ending-desc" id="endingDesc">剧情描述...</div>
                <div class="ending-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="statNodes">0</div>
                        <div class="stat-label">经历节点</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statChoices">0</div>
                        <div class="stat-label">做出选择</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statTime">0:00</div>
                        <div class="stat-label">游戏时长</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="game.restart()">🔄 重新开始</button>
            </div>
            
            <!-- 进度条 -->
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-primary" id="startBtn">▶ 开始游戏</button>
        <button class="btn btn-secondary" id="skipBtn">⏭ 跳过剧情</button>
        <button class="btn btn-secondary" onclick="game.restart()">🔄 重置</button>
    </div>

    <div class="video-upload">
        <label for="videoUpload">📁 上传视频配置</label>
        <input type="file" id="videoUpload" accept=".json">
    </div>

    <!-- 节点地图 -->
    <div class="node-map">
        <h3>📍 当前路径</h3>
        <div class="node-path" id="nodePath">
            <span style="color: #666">等待开始...</span>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
